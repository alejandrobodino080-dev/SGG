<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-light">
    <header>
        <button id="theme-toggle" aria-label="Cambiar tema de color">Luna / Sol</button>
    </header>
    
    <main class="login-container">
        <h1>Iniciar Sesión</h1>
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit">Ingresar</button>
            <p id="error-message" class="error-text" aria-live="polite"></p>
        </form>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
